<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>EcoTrueque - Registro</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <!-- Cargar Supabase primero -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      // Configuración directa aquí mismo
      const SUPABASE_URL = "https://qrktpmpitdabxvxriomp.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFya3RwbXBpdGRhYnh2eHJpb21wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwODU3MDUsImV4cCI6MjA5MDY2MTcwNX0.79fkqfQlNJEISPrZrjePWtmP9O-2dLzFmuk2gFQx3PE";
      
      let supabase = null;
      
      // Esperar a que la librería esté lista
      function initSupabase() {
        if (window.supabase && !supabase) {
          supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
          console.log("✅ Supabase inicializado correctamente");
        }
        return supabase;
      }
      
      // Intentar inicializar inmediatamente
      initSupabase();
      
      // También intentar cuando el DOM esté listo
      document.addEventListener('DOMContentLoaded', () => {
        initSupabase();
      });
    </script>
    <style>
      .glass-card {
        background: rgba(255, 255, 255, 0.4);
        backdrop-filter: blur(20px);
      }
    </style>
  </head>
  <body class="bg-background font-body text-on-surface">
    <main
      class="min-h-screen flex items-center justify-center p-6 relative overflow-hidden"
    >
      <div
        class="absolute -top-24 -left-24 w-96 h-96 bg-primary-container/20 rounded-full blur-3xl"
      ></div>

      <div
        class="w-full max-w-6xl grid grid-cols-1 lg:grid-cols-2 gap-12 items-center relative z-10"
      >
        <div class="hidden lg:flex flex-col space-y-8">
          <div>
            <span
              class="inline-block py-1 px-4 rounded-full bg-primary-container text-on-primary-container text-sm mb-6"
              >Únete al cambio</span
            >
            <h1
              class="font-headline font-extrabold text-6xl text-primary tracking-tighter leading-none mb-4"
            >
              EcoTrueque
            </h1>
            <p
              class="font-headline text-3xl text-on-surface-variant font-bold max-w-md"
            >
              Transforma tus residuos en valor real.
            </p>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div class="glass-card p-6 rounded-lg">
              <span class="material-symbols-outlined text-primary mb-3"
                >recycling</span
              >
              <div id="cont-usuarios" class="text-2xl font-headline font-black">
                ...
              </div>
              <div class="text-sm text-on-surface-variant">
                Usuarios activos
              </div>
            </div>
            <div class="glass-card p-6 rounded-lg mt-8">
              <span class="material-symbols-outlined text-primary mb-3"
                >eco</span
              >
              <div id="cont-co2" class="text-2xl font-headline font-black">
                ...
              </div>
              <div class="text-sm text-on-surface-variant">CO2 Ahorrado</div>
            </div>
          </div>
        </div>

        <div class="w-full">
          <div
            class="bg-surface-container-lowest p-8 md:p-12 rounded-xl shadow-xl"
          >
            <h2 class="font-headline text-3xl font-bold mb-6">
              Crea tu cuenta
            </h2>
            <form id="registrationForm" class="space-y-6">
              <input
                required
                id="full_name"
                class="w-full bg-surface-container-low border-none rounded-sm px-4 py-3"
                type="text"
                placeholder="Nombre Completo"
              />
              <input
                required
                id="cedula"
                class="w-full bg-surface-container-low border-none rounded-sm px-4 py-3"
                type="text"
                placeholder="Cédula (ej: V-12345678)"
              />
              <input
                required
                id="email"
                class="w-full bg-surface-container-low border-none rounded-sm px-4 py-3"
                type="email"
                placeholder="Correo Electrónico"
              />
              <div class="grid grid-cols-2 gap-4">
                <input
                  required
                  id="password"
                  class="w-full bg-surface-container-low border-none rounded-sm px-4 py-3"
                  type="password"
                  placeholder="Contraseña"
                />
                <input
                  required
                  id="confirm_password"
                  class="w-full bg-surface-container-low border-none rounded-sm px-4 py-3"
                  type="password"
                  placeholder="Confirmar"
                />
              </div>
              <button
                class="w-full py-4 bg-gradient-to-r from-primary to-primary-dim text-on-primary font-bold rounded-full shadow-lg hover:scale-[1.02] transition-all"
                type="submit"
              >
                Unirme a la Comunidad
              </button>
            </form>
            <p class="mt-8 text-center text-on-surface-variant">
              ¿Ya tienes cuenta?
              <a
                class="text-primary font-bold hover:underline"
                href="index.html"
                >Inicia sesión</a
              >
            </p>
          </div>
        </div>
      </div>
    </main>

    <script>
      // Función para esperar a que Supabase esté listo
      function waitForSupabase() {
        return new Promise((resolve) => {
          if (supabase) {
            resolve(supabase);
          } else {
            const checkInterval = setInterval(() => {
              if (supabase) {
                clearInterval(checkInterval);
                resolve(supabase);
              } else if (window.supabase && !supabase) {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                if (supabase) {
                  clearInterval(checkInterval);
                  resolve(supabase);
                }
              }
            }, 100);
            
            // Timeout después de 5 segundos
            setTimeout(() => {
              clearInterval(checkInterval);
              console.error("Timeout esperando Supabase");
              resolve(null);
            }, 5000);
          }
        });
      }
      
      async function cargarEstadisticas() {
        const client = await waitForSupabase();
        if (!client) {
          console.error("No se pudo inicializar Supabase");
          document.getElementById("cont-usuarios").innerText = `0+`;
          return;
        }
        
        try {
          const { count: usuarios } = await client
            .from('perfiles')
            .select('*', { count: 'exact', head: true });
          
          document.getElementById("cont-usuarios").innerText = `${usuarios || 0}+`;
        } catch (error) {
          console.error("Error:", error);
          document.getElementById("cont-usuarios").innerText = `0+`;
        }
      }
      
      // Registro
      document.getElementById("registrationForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirm_password").value;
        const fullName = document.getElementById("full_name").value;
        const cedula = document.getElementById("cedula").value;

        if (password !== confirmPassword) {
          alert("Las contraseñas no coinciden");
          return;
        }

        if (password.length < 6) {
          alert("La contraseña debe tener al menos 6 caracteres");
          return;
        }

        // Deshabilitar botón
        const submitBtn = e.target.querySelector('button[type="submit"]');
        const originalText = submitBtn.textContent;
        submitBtn.disabled = true;
        submitBtn.textContent = "Registrando...";

        try {
          console.log("Esperando Supabase...");
          const client = await waitForSupabase();
          
          if (!client) {
            throw new Error("No se pudo conectar con Supabase. Verifica tu conexión a internet.");
          }
          
          console.log("Supabase listo, iniciando registro...");
          
          // 1. Crear usuario en Auth
          const { data: authData, error: signUpError } = await client.auth.signUp({
            email: email,
            password: password,
          });
          
          if (signUpError) throw signUpError;
          
          if (!authData.user) {
            throw new Error("No se pudo crear el usuario");
          }
          
          console.log("Usuario creado:", authData.user.id);
          
          // 2. Crear perfil
          const { error: profileError } = await client
            .from('perfiles')
            .insert({
              id: authData.user.id,
              nombre_completo: fullName,
              cedula: cedula,
              puntos: 0,
              co2_ahorrado: 0,
              rol: 'user',
              email: email
            });
            
          if (profileError) {
            console.error("Error al crear perfil:", profileError);
            throw new Error("Error al guardar el perfil: " + profileError.message);
          }
          
          alert("¡Registro exitoso! Ahora puedes iniciar sesión.");
          window.location.href = "index.html";
          
        } catch (error) {
          console.error("Error completo:", error);
          alert("Error: " + error.message);
          submitBtn.disabled = false;
          submitBtn.textContent = originalText;
        }
      });
      
      // Inicializar
      waitForSupabase().then(() => {
        cargarEstadisticas();
      });
    </script>
  </body>
</html>
