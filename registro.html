<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EcoTrueque - Registro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl p-8 max-w-md w-full">
        <div class="text-center mb-6">
            <span class="text-4xl">♻️</span>
            <h1 class="text-3xl font-bold text-green-700">EcoTrueque</h1>
            <p class="text-gray-500">Crea tu cuenta</p>
        </div>
        
        <form id="registerForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Nombre Completo</label>
                <input type="text" id="fullName" required class="w-full mt-1 p-3 border border-gray-300 rounded-lg focus:ring-green-500 focus:border-green-500">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">Cédula</label>
                <input type="text" id="cedula" required class="w-full mt-1 p-3 border border-gray-300 rounded-lg focus:ring-green-500 focus:border-green-500">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">Correo Electrónico</label>
                <input type="email" id="email" required class="w-full mt-1 p-3 border border-gray-300 rounded-lg focus:ring-green-500 focus:border-green-500">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">Contraseña</label>
                <input type="password" id="password" required class="w-full mt-1 p-3 border border-gray-300 rounded-lg focus:ring-green-500 focus:border-green-500">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">Confirmar Contraseña</label>
                <input type="password" id="confirmPassword" required class="w-full mt-1 p-3 border border-gray-300 rounded-lg focus:ring-green-500 focus:border-green-500">
            </div>
            
            <button type="submit" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700 transition">
                Registrarse
            </button>
        </form>
        
        <p class="mt-4 text-center text-gray-600">
            ¿Ya tienes cuenta? 
            <a href="index.html" class="text-green-600 hover:underline">Inicia sesión</a>
        </p>
        
        <div id="message" class="mt-4 text-center text-sm hidden"></div>
    </div>

    <script>
        const SUPABASE_URL = "https://qrktpmpitdabxvxriomp.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFya3RwbXBpdGRhYnh2eHJpb21wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwODU3MDUsImV4cCI6MjA5MDY2MTcwNX0.79fkqfQlNJEISPrZrjePWtmP9O-2dLzFmuk2gFQx3PE";
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        const form = document.getElementById('registerForm');
        const messageDiv = document.getElementById('message');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fullName = document.getElementById('fullName').value;
            const cedula = document.getElementById('cedula').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Validaciones
            if (password !== confirmPassword) {
                showMessage("Las contraseñas no coinciden", "red");
                return;
            }
            
            if (password.length < 6) {
                showMessage("La contraseña debe tener al menos 6 caracteres", "red");
                return;
            }
            
            // Deshabilitar botón
            const submitBtn = form.querySelector('button');
            submitBtn.disabled = true;
            submitBtn.textContent = "Registrando...";
            
            try {
                // Registrar usuario con metadata
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            nombre_completo: fullName,
                            cedula: cedula
                        }
                    }
                });
                
                if (error) throw error;
                
                if (data.user) {
                    showMessage("¡Registro exitoso! Revisa tu correo para confirmar.", "green");
                    setTimeout(() => {
                        window.location.href = "index.html";
                    }, 2000);
                } else {
                    throw new Error("No se pudo crear el usuario");
                }
                
            } catch (error) {
                console.error("Error:", error);
                showMessage("Error: " + error.message, "red");
                submitBtn.disabled = false;
                submitBtn.textContent = "Registrarse";
            }
        });
        
        function showMessage(msg, color) {
            messageDiv.textContent = msg;
            messageDiv.className = `mt-4 text-center text-sm p-3 rounded-lg ${color === 'red' ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}`;
            messageDiv.classList.remove('hidden');
        }
    </script>
</body>
</html>
