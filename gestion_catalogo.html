<!doctype html>
<html class="light" lang="es">
  <head>
    <meta charset="utf-8" />
    <title>EcoTrueque - Inventario de Premios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { primary: "#006a2b" },
            fontFamily: { headline: ["Manrope"], body: ["Inter"] },
          },
        },
      };
    </script>
  </head>
  <body class="bg-[#f6f7f6] font-body flex min-h-screen">
    <aside
      class="w-72 bg-white border-r border-slate-100 p-8 flex flex-col fixed h-full"
    >
      <div class="mb-12 flex items-center gap-2 text-primary">
        <span class="material-symbols-outlined text-4xl">recycling</span>
        <span class="font-headline font-black text-2xl tracking-tighter"
          >EcoTrueque</span
        >
      </div>
      <nav class="space-y-3 flex-grow">
        <a
          href="panel_admin.html"
          class="flex items-center gap-4 px-6 py-4 rounded-2xl text-slate-500 hover:bg-slate-50 transition-all font-medium"
        >
          <span class="material-symbols-outlined">dashboard</span>
          <span>Panel</span>
        </a>
        <a
          href="gestion_usuarios.html"
          class="flex items-center gap-4 px-6 py-4 rounded-2xl text-slate-500 hover:bg-slate-50 transition-all font-medium"
        >
          <span class="material-symbols-outlined">group</span>
          <span>Usuarios</span>
        </a>
        <a
          href="gestion_catalogo.html"
          class="flex items-center gap-4 px-6 py-4 rounded-2xl bg-primary text-white shadow-lg shadow-primary/20 font-bold"
        >
          <span class="material-symbols-outlined">inventory_2</span>
          <span>Catálogo</span>
        </a>
        <a
          href="gestion_entrega.html"
          class="flex items-center gap-4 px-6 py-4 rounded-2xl text-slate-500 hover:bg-slate-50 transition-all font-medium"
        >
          <span class="material-symbols-outlined">local_shipping</span>
          <span>Entregas</span>
        </a>
      </nav>
      <button
        onclick="cerrarSesion()"
        class="flex items-center gap-4 px-6 py-4 rounded-2xl text-red-500 hover:bg-red-50 transition-all font-medium mt-auto"
      >
        <span class="material-symbols-outlined">logout</span> Cerrar Sesión
      </button>
    </aside>

    <main class="flex-grow ml-72 p-12">
      <header class="flex justify-between items-center mb-12">
        <h1 class="font-headline font-black text-5xl text-slate-900 italic">
          Gestión de <span class="text-primary">Premios</span>
        </h1>
        <button
          onclick="openModal()"
          class="bg-slate-900 text-white px-8 py-4 rounded-full font-black text-xs uppercase tracking-widest hover:scale-105 transition-all"
        >
          + Nuevo Producto
        </button>
      </header>

      <div
        id="catalog-grid"
        class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8"
      ></div>
    </main>

    <div
      id="modal"
      class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4"
    >
      <div class="bg-white w-full max-w-lg rounded-[3rem] p-10 shadow-2xl">
        <h2 id="modal-title" class="font-headline font-black text-3xl mb-8">
          Nuevo Producto
        </h2>
        <div class="space-y-4">
          <input id="p-id" type="hidden" />
          <input
            id="p-nombre"
            type="text"
            placeholder="Nombre del premio"
            class="w-full px-6 py-4 bg-slate-50 rounded-2xl border-none font-bold"
          />
          <input
            id="p-puntos"
            type="number"
            placeholder="Puntos requeridos"
            class="w-full px-6 py-4 bg-slate-50 rounded-2xl border-none font-bold"
          />
          <div class="flex gap-4">
            <button
              onclick="saveProduct()"
              class="flex-grow bg-primary text-white py-4 rounded-2xl font-black uppercase text-xs"
            >
              Guardar
            </button>
            <button
              onclick="closeModal()"
              class="px-8 bg-slate-100 text-slate-500 py-4 rounded-2xl font-black uppercase text-xs"
            >
              Cancelar
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="config.js"></script>
    <script>
      async function loadCatalog() {
        const { data: productos, error } = await supabase
          .from('productos')
          .select('*')
          .order('puntos_requeridos', { ascending: true });
          
        if (error) {
          console.error(error);
          return;
        }
        
        const grid = document.getElementById("catalog-grid");
        
        if (productos && productos.length > 0) {
          grid.innerHTML = productos.map(p => `
            <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100">
              <h3 class="font-headline font-black text-xl mb-1">${p.nombre}</h3>
              <p class="text-primary font-black text-2xl italic mb-6">${p.puntos_requeridos} PTS</p>
              <div class="flex gap-2">
                <button onclick="editProduct('${p.id}', '${p.nombre}', ${p.puntos_requeridos})" class="flex-grow bg-slate-50 py-3 rounded-xl font-bold hover:bg-slate-100">Editar</button>
                <button onclick="deleteProduct('${p.id}')" class="px-4 bg-red-50 text-red-500 py-3 rounded-xl hover:bg-red-500 hover:text-white transition-all">
                  <span class="material-symbols-outlined">delete</span>
                </button>
              </div>
            </div>
          `).join("");
        } else {
          grid.innerHTML = '<div class="col-span-full text-center p-12 text-slate-400">No hay premios disponibles</div>';
        }
      }

      function openModal() {
        document.getElementById("modal").classList.remove("hidden");
        document.getElementById("modal-title").innerText = "Nuevo Producto";
        document.getElementById("p-id").value = "";
        document.getElementById("p-nombre").value = "";
        document.getElementById("p-puntos").value = "";
      }

      function closeModal() {
        document.getElementById("modal").classList.add("hidden");
      }

      async function saveProduct() {
        const id = document.getElementById("p-id").value;
        const nombre = document.getElementById("p-nombre").value;
        const puntos = parseInt(document.getElementById("p-puntos").value);

        if (!nombre || !puntos) {
          alert("Por favor completa todos los campos");
          return;
        }

        if (id) {
          const { error } = await supabase
            .from('productos')
            .update({ nombre, puntos_requeridos: puntos })
            .eq('id', id);
            
          if (error) alert("Error: " + error.message);
        } else {
          const { error } = await supabase
            .from('productos')
            .insert({ nombre, puntos_requeridos: puntos, stock: 10, activo: true });
            
          if (error) alert("Error: " + error.message);
        }
        
        closeModal();
        loadCatalog();
      }

      async function deleteProduct(id) {
        if (confirm("¿Seguro que quieres eliminar este premio?")) {
          const { error } = await supabase
            .from('productos')
            .delete()
            .eq('id', id);
            
          if (error) alert("Error: " + error.message);
          else loadCatalog();
        }
      }

      function editProduct(id, nombre, puntos) {
        openModal();
        document.getElementById("modal-title").innerText = "Editar Producto";
        document.getElementById("p-id").value = id;
        document.getElementById("p-nombre").value = nombre;
        document.getElementById("p-puntos").value = puntos;
      }

      async function verificarAutenticacion() {
        const usuario = await verificarAutenticacion(['admin']);
        if (!usuario) return;
        loadCatalog();
      }

      window.onload = verificarAutenticacion;
    </script>
  </body>
</html>
