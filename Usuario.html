<!doctype html>
<html lang="es" class="light">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>EcoTrueque - Tu Impacto Positivo</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#006a2b",
              surface: "#f6f7f6",
              accent: "#72fe8f",
            },
            fontFamily: { headline: ["Manrope"], body: ["Inter"] },
          },
        },
      };
    </script>
  </head>
  <body class="bg-surface font-body min-h-screen">
    <nav class="bg-white border-b border-slate-100 px-6 py-4 sticky top-0 z-40">
      <div class="max-w-5xl mx-auto flex justify-between items-center">
        <div class="flex items-center gap-2 text-primary">
          <span class="material-symbols-outlined text-3xl font-bold">eco</span>
          <span class="font-headline font-black text-xl tracking-tighter text-slate-900">EcoTrueque</span>
        </div>
        <button onclick="cerrarSesion()" class="flex items-center gap-2 text-slate-500 font-bold text-sm hover:text-red-600 transition-colors">
          Cerrar Sesión <span class="material-symbols-outlined">logout</span>
        </button>
      </div>
    </nav>

    <main class="max-w-5xl mx-auto p-6 md:p-12">
      <header class="mb-10 text-center md:text-left">
        <h1 class="font-headline font-black text-4xl text-slate-900 mb-2 italic">
          ¡Hola, <span id="user-name" class="text-primary italic">...</span>!
        </h1>
        <p class="text-slate-500 font-medium">Este es el impacto de tu compromiso ambiental.</p>
      </header>

      <div class="bg-slate-900 rounded-[2.5rem] p-10 text-white relative overflow-hidden shadow-2xl mb-10">
        <div class="relative z-10">
          <p class="text-[10px] uppercase font-black tracking-[0.2em] text-accent mb-4">Balance Disponible</p>
          <div class="flex items-end gap-3 mb-8">
            <span id="user-points" class="text-7xl font-headline font-black leading-none">0</span>
            <span class="text-xl font-bold opacity-40 mb-2 tracking-tighter">EcoPuntos</span>
          </div>
          <div class="border-t border-white/10 pt-8 max-w-xs">
            <p class="text-[10px] uppercase font-bold opacity-50 mb-1 tracking-widest">CO2 Evitado Estimado</p>
            <p class="text-xl font-headline font-black text-accent">
              <span id="user-co2">0.0</span><span class="text-sm italic font-medium">kg</span>
            </p>
          </div>
        </div>
        <span class="material-symbols-outlined absolute -right-12 -bottom-12 text-[20rem] opacity-5 rotate-12 select-none">nature_people</span>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
        <a href="catalogo_usuario.html" class="bg-white p-8 rounded-[2.5rem] border border-slate-100 flex items-center gap-6 hover:scale-[1.02] transition-all group shadow-sm">
          <div class="w-14 h-14 bg-accent/20 text-primary rounded-2xl flex items-center justify-center group-hover:bg-primary group-hover:text-white transition-colors">
            <span class="material-symbols-outlined text-3xl">redeem</span>
          </div>
          <div>
            <h3 class="font-headline font-black text-xl text-slate-900 italic">Ver Premios</h3>
            <p class="text-sm text-slate-400">Consulta los productos disponibles</p>
          </div>
        </a>

        <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 flex items-center gap-6 shadow-sm opacity-50 grayscale-[0.5]">
          <div class="w-14 h-14 bg-slate-100 text-slate-400 rounded-2xl flex items-center justify-center">
            <span class="material-symbols-outlined text-3xl">map</span>
          </div>
          <div>
            <h3 class="font-headline font-black text-xl text-slate-900 italic">Mapa de Acopio</h3>
            <p class="text-xs font-black uppercase tracking-widest text-primary mt-1">Próximamente</p>
          </div>
        </div>
      </div>

      <h2 class="font-headline font-black text-2xl text-slate-900 mb-6 italic text-center md:text-left">Actividad Reciente</h2>
      <div class="space-y-4" id="user-history"></div>
    </main>

    <script src="config.js"></script>
    <script>
      async function init() {
        const usuario = await obtenerUsuarioActual();
        
        if (!usuario) {
          window.location.href = "index.html";
          return;
        }
        
        document.getElementById("user-name").innerText = usuario.nombre_completo?.split(' ')[0] || "Usuario";
        document.getElementById("user-points").innerText = usuario.puntos || 0;
        
        const { data: historial } = await supabase
          .from('entregas')
          .select('*')
          .eq('usuario_id', usuario.id)
          .order('fecha', { ascending: false })
          .limit(10);
          
        const historyContainer = document.getElementById("user-history");
        let co2Total = 0;
        
        if (historial && historial.length > 0) {
          historyContainer.innerHTML = historial.map(t => {
            co2Total += t.peso_kg * 0.45;
            const fecha = new Date(t.fecha).toLocaleDateString('es-ES');
            return `
              <div class="bg-white p-6 rounded-[2rem] border border-slate-100 flex justify-between items-center shadow-sm hover:border-primary/20 transition-all">
                <div class="flex items-center gap-4">
                  <div class="w-10 h-10 bg-primary/5 rounded-full flex items-center justify-center text-primary">
                    <span class="material-symbols-outlined text-sm font-bold">recycling</span>
                  </div>
                  <div>
                    <p class="font-bold text-slate-900">${t.material}</p>
                    <p class="text-[10px] text-slate-400 font-black uppercase tracking-[0.1em]">${fecha}</p>
                  </div>
                </div>
                <div class="text-right">
                  <p class="font-headline font-black text-primary text-2xl tracking-tighter">+${t.puntos_ganados}</p>
                  <p class="text-[10px] font-bold text-slate-300 uppercase italic">${t.peso_kg} KG</p>
                </div>
              </div>
            `;
          }).join("");
          document.getElementById("user-co2").innerHTML = `${co2Total.toFixed(1)} <span class="text-sm italic font-medium">kg</span>`;
        } else {
          historyContainer.innerHTML = `<div class="bg-white/50 p-12 rounded-[2.5rem] border border-dashed border-slate-200 text-center">
            <span class="material-symbols-outlined text-slate-300 text-5xl mb-4">history</span>
            <p class="text-slate-400 font-medium">Aún no tienes registros de actividad.</p>
          </div>`;
        }
      }

      window.onload = init;
    </script>
  </body>
</html>
