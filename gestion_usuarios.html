<!doctype html>
<html class="light" lang="es">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>EcoCanje - Gestión de Usuarios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { primary: "#006a2b", surface: "#f6f7f6" },
            fontFamily: { headline: ["Manrope"], body: ["Inter"] },
          },
        },
      };
    </script>
  </head>
  <body class="bg-surface font-body flex min-h-screen">
    <aside
      class="w-72 bg-white border-r border-slate-100 p-8 flex flex-col fixed h-full z-30"
    >
      <div class="mb-12 flex items-center gap-2 text-primary">
        <span class="material-symbols-outlined text-4xl">recycling</span>
        <span class="font-headline font-black text-2xl tracking-tighter"
          >EcoCanje</span
        >
      </div>
      <nav class="space-y-3 flex-grow">
        <a
          href="panel_admin.html"
          class="flex items-center gap-4 px-6 py-4 rounded-2xl text-slate-500 hover:bg-slate-50 transition-all font-medium"
        >
          <span class="material-symbols-outlined">dashboard</span>
          <span>Panel</span>
        </a>
        <a
          href="gestion_usuarios.html"
          class="flex items-center gap-4 px-6 py-4 rounded-2xl bg-primary text-white shadow-lg shadow-primary/20 font-bold"
        >
          <span class="material-symbols-outlined">group</span>
          <span>Usuarios</span>
        </a>
        <a
          href="gestion_catalogo.html"
          class="flex items-center gap-4 px-6 py-4 rounded-2xl text-slate-500 hover:bg-slate-50 transition-all font-medium"
        >
          <span class="material-symbols-outlined">inventory_2</span>
          <span>Catálogo</span>
        </a>
        <a
          href="gestion_entrega.html"
          class="flex items-center gap-4 px-6 py-4 rounded-2xl text-slate-500 hover:bg-slate-50 transition-all font-medium"
        >
          <span class="material-symbols-outlined">local_shipping</span>
          <span>Entregas</span>
        </a>
      </nav>
    </aside>

    <main class="flex-grow ml-72 p-12">
      <header class="mb-12">
        <p
          class="text-primary font-bold text-xs uppercase tracking-widest mb-2 opacity-60"
        >
          Administración de Comunidad
        </p>
        <h1
          class="font-headline font-black text-5xl text-slate-900 tracking-tight"
        >
          Lista de <span class="text-primary italic">Usuarios</span>
        </h1>
      </header>

      <div
        class="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden"
      >
        <table class="w-full text-left border-collapse">
          <thead class="bg-slate-50/50">
            <tr>
              <th
                class="px-8 py-6 text-[10px] font-black text-slate-400 uppercase tracking-widest"
              >
                Nombre
              </th>
              <th
                class="px-8 py-6 text-[10px] font-black text-slate-400 uppercase tracking-widest"
              >
                Correo Electrónico
              </th>
              <th
                class="px-8 py-6 text-[10px] font-black text-slate-400 uppercase tracking-widest"
              >
                Cédula
              </th>
              <th
                class="px-8 py-6 text-[10px] font-black text-slate-400 uppercase tracking-widest"
              >
                Rol
              </th>
              <th
                class="px-8 py-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right"
              >
                Saldo Actual
              </th>
            </tr>
          </thead>
          <tbody id="user-rows" class="divide-y divide-slate-50">
            <tr>
              <td
                colspan="5"
                class="px-8 py-12 text-center text-slate-400 animate-pulse font-medium"
              >
                Cargando base de datos de ciudadanos...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>
      const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      async function loadUsers() {
        try {
          const { data: users, error } = await _supabase
            .from("profiles")
            .select("full_name, email, cedula, puntos, rol")
            .order("full_name", { ascending: true });

          if (error) throw error;

          const tbody = document.getElementById("user-rows");

          if (!users || users.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" class="px-8 py-12 text-center text-slate-400">No hay usuarios registrados todavía.</td></tr>`;
            return;
          }

          tbody.innerHTML = users
            .map(
              (u) => `
                    <tr class="hover:bg-slate-50/50 transition-colors group">
                        <td class="px-8 py-6 font-bold text-slate-900">${u.full_name || "Sin nombre"}</td>
                        <td class="px-8 py-6 text-slate-500 font-medium lowercase italic">${u.email || "No registrado"}</td>
                        <td class="px-8 py-6 text-slate-400 font-mono text-sm">${u.cedula || "---"}</td>
                        <td class="px-8 py-6">
                            <span class="inline-block px-3 py-1 rounded-full text-xs font-bold ${u.rol === "admin" ? "bg-purple-100 text-purple-700" : u.rol === "subadmin" ? "bg-blue-100 text-blue-700" : "bg-green-100 text-green-700"}">
                                ${u.rol || "user"}
                            </span>
                        </td>
                        <td class="px-8 py-6 text-right">
                            <span class="inline-block bg-green-50 text-primary px-4 py-2 rounded-2xl font-black text-xs border border-green-100 shadow-sm">
                                ${u.puntos || 0} <span class="opacity-60 text-[9px]">PTS</span>
                            </span>
                        </td>
                    </tr>
                `,
            )
            .join("");
        } catch (err) {
          console.error("Error al cargar usuarios:", err);
          document.getElementById("user-rows").innerHTML = `
                    <tr><td colspan="5" class="px-8 py-12 text-center text-red-500 font-bold">Error de conexión con la base de datos.</td></tr>
                `;
        }
      }

      async function verificarAutenticacion() {
        const {
          data: { user },
        } = await _supabase.auth.getUser();
        if (!user) {
          window.location.href = "index.html";
          return;
        }

        const { data: profile } = await _supabase
          .from("profiles")
          .select("rol")
          .eq("id", user.id)
          .single();

        if (!profile || profile.rol !== "admin") {
          window.location.href = "Usuario.html";
        } else {
          loadUsers();
        }
      }

      window.onload = verificarAutenticacion;
    </script>
  </body>
</html>
