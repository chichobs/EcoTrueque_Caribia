<!doctype html>
<html lang="es" class="light">
  <head>
    <meta charset="utf-8" />
    <title>EcoCanje - Catálogo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/appwrite@17.0.0"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { primary: "#006a2b" },
            fontFamily: { headline: ["Manrope"] },
          },
        },
      };
    </script>
  </head>
  <body class="bg-[#f6f7f6] min-h-screen p-6 md:p-12">
    <div class="max-w-5xl mx-auto">
      <header class="flex justify-between items-center mb-12">
        <a
          href="Usuario.html"
          class="flex items-center gap-2 text-slate-500 font-bold hover:text-primary transition-colors"
        >
          <span class="material-symbols-outlined">arrow_back</span> Volver
        </a>
        <div
          class="bg-white px-6 py-3 rounded-full border border-slate-100 shadow-sm flex items-center gap-3"
        >
          <span class="text-[10px] font-black uppercase text-slate-400"
            >Tus Puntos:</span
          >
          <span
            id="mis-puntos"
            class="font-headline font-black text-primary text-xl"
            >0</span
          >
        </div>
      </header>

      <h1 class="font-headline font-black text-5xl text-slate-900 mb-4 italic">
        Premios <span class="text-primary">Disponibles</span>
      </h1>
      <p class="text-slate-500 mb-12 max-w-xl">
        Conoce los productos sostenibles que puedes obtener en nuestra tienda física.
      </p>

      <div
        id="grid-recompensas"
        class="grid grid-cols-1 md:grid-cols-3 gap-8"
      ></div>
    </div>

    <script src="config.js"></script>
    <script>
      async function cargarCatalogo() {
        try {
          const user = await account.get();

          // Obtener puntos del usuario
          const usuarios = await databases.listDocuments(DATABASE_ID, COLLECTION_USUARIOS, [
            Appwrite.Query.equal('email', user.email)
          ]);

          let puntosActuales = 0;
          if (usuarios.total > 0) {
            puntosActuales = usuarios.documents[0].puntos || 0;
            document.getElementById("mis-puntos").innerText = puntosActuales;
          }

          // Cargar productos
          const productos = await databases.listDocuments(DATABASE_ID, COLLECTION_PRODUCTOS);
          const grid = document.getElementById("grid-recompensas");

          if (productos.total > 0) {
            grid.innerHTML = productos.documents.map(p => {
              const puntosRequeridos = p.puntos || p.price;
              return `
                <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm flex flex-col group">
                  <div class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center mb-6 text-primary group-hover:scale-110 transition-transform">
                    <span class="material-symbols-outlined">redeem</span>
                  </div>
                  <h3 class="font-headline font-black text-xl text-slate-900 mb-2">${p.nombre || p.productName}</h3>
                  <p class="text-3xl font-headline font-black text-primary mb-8 italic">${puntosRequeridos} <span class="text-xs opacity-40">ECO</span></p>
                  <div class="mt-auto w-full py-4 rounded-2xl font-bold text-center bg-slate-100 text-slate-400 cursor-not-allowed">
                    Canje en tienda física
                  </div>
                </div>
              `;
            }).join("");
          } else {
            grid.innerHTML = '<div class="col-span-full text-center p-12 text-slate-400">No hay premios disponibles por ahora</div>';
          }
        } catch (error) {
          console.error("Error cargando catálogo:", error);
          window.location.href = "index.html";
        }
      }

      window.onload = cargarCatalogo;
    </script>
  </body>
</html>
